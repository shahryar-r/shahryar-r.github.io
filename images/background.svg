<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90" shape-rendering="crispEdges">
  <rect width="90" height="90" fill="none"/>

  <!-- grid lines -->
  <g stroke="white" opacity="0.5" stroke-width="0.5">
    <!-- vertical -->
    <path d="M10 0V90"/>
    <path d="M20 0V90"/>
    <path d="M30 0V90"/>
    <path d="M40 0V90"/>
    <path d="M50 0V90"/>
    <path d="M60 0V90"/>
    <path d="M70 0V90"/>
    <path d="M80 0V90"/>

    <!-- horizontal -->
    <path d="M0 10H90"/>
    <path d="M0 20H90"/>
    <path d="M0 30H90"/>
    <path d="M0 40H90"/>
    <path d="M0 50H90"/>
    <path d="M0 60H90"/>
    <path d="M0 70H90"/>
    <path d="M0 80H90"/>
  </g>

  <!-- border line (designed to NOT create seams) -->
  <path d="M0 0H90V90H0Z" fill="none" stroke="white" stroke-opacity="1" stroke-width="0.5"/>
</svg>